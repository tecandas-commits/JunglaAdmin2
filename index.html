<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultor Digital - 4º ESO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
        body { font-family: 'Outfit', sans-serif; background: #0f172a; }
        .window-shadow { box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .hero-image { 
            width: 100%; 
            max-width: 450px; 
            border-radius: 1.5rem; 
            margin: 0 auto 1.5rem;
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.3);
            border: 4px solid #f8fafc;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 bg-gradient-to-tr from-slate-950 via-slate-900 to-blue-900">

<div x-data="gameApp()" class="w-full max-w-4xl">
    
    <!-- PANTALLA DE BIENVENIDA -->
    <template x-if="screen === 'welcome'">
        <div class="bg-white p-8 rounded-[2.5rem] window-shadow text-center border border-white/20 relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-blue-500 via-purple-500 to-emerald-500"></div>
            
            <!-- CARGA DE TU IMAGEN LOCAL imagen1.png -->
            <img src="imagen1.png" alt="Aventura Digital ESO" class="hero-image" 
                 onerror="this.style.display='none'; console.error('Error: No se encuentra imagen1.png en la misma carpeta que el HTML.');">
            
            <h1 class="text-4xl font-extrabold text-slate-800 mb-2 tracking-tight">Consultoría Digital</h1>
            <p class="text-slate-500 mb-8 text-lg font-medium">Validación de competencias en Administración Electrónica</p>
            
            <div class="max-w-sm mx-auto space-y-4">
                <input type="text" x-model="userName" placeholder="Nombre del Alumno/a" 
                       class="w-full px-6 py-4 border-2 border-slate-100 rounded-2xl focus:border-blue-500 focus:ring-4 focus:ring-blue-100 outline-none transition-all text-center text-xl font-bold text-slate-700">
                
                <button @click="startGame()" 
                        :disabled="!userName.trim()"
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-5 px-8 rounded-2xl transition-all transform hover:scale-[1.02] active:scale-95 disabled:opacity-30 shadow-xl shadow-blue-200 uppercase tracking-wider">
                    ¡COMENZAR TRÁMITE!
                </button>
            </div>
        </div>
    </template>

    <!-- INTERFAZ DE MISIONES -->
    <template x-if="screen === 'game'">
        <div class="w-full space-y-4">
            <div class="flex justify-between items-center px-4">
                <div class="flex gap-3 text-white">
                    <span class="bg-white/10 backdrop-blur-md px-4 py-2 rounded-2xl border border-white/20 font-bold">
                        <i class="fa-solid fa-user-check mr-2 text-blue-400"></i> <span x-text="userName"></span>
                    </span>
                </div>
                <div class="text-4xl font-black text-white"><span x-text="score"></span> <span class="text-sm text-blue-300 uppercase">pts</span></div>
            </div>

            <div class="bg-slate-50 rounded-[2rem] window-shadow border border-slate-200 overflow-hidden min-h-[580px] flex flex-col">
                <div class="bg-slate-800 text-white px-6 py-4 flex justify-between items-center">
                    <div class="flex gap-2">
                        <div class="w-3 h-3 rounded-full bg-red-500"></div>
                        <div class="w-3 h-3 rounded-full bg-yellow-500"></div>
                        <div class="w-3 h-3 rounded-full bg-green-500"></div>
                    </div>
                    <span class="text-xs font-black uppercase tracking-widest opacity-60">Misión <span x-text="currentMission + 1"></span> de 5</span>
                    <div class="w-10"></div>
                </div>

                <div class="flex-1 p-8 md:p-12">
                    <div class="max-w-2xl mx-auto">
                        <h2 class="text-3xl font-extrabold text-slate-800 mb-4" x-text="missions[currentMission].instruction"></h2>
                        <div class="p-5 bg-white rounded-2xl border border-slate-200 shadow-sm mb-10 text-slate-600 italic" x-text="missions[currentMission].context"></div>

                        <div class="grid grid-cols-1 gap-4">
                            <template x-for="(opt, index) in missions[currentMission].options" :key="index">
                                <button @click="selectedOption = index"
                                        :class="selectedOption === index ? 'border-blue-500 bg-blue-50 ring-4 ring-blue-100' : 'border-slate-200 bg-white hover:border-blue-300'"
                                        class="text-left p-6 border-2 rounded-2xl transition-all flex items-center gap-4 group">
                                    <div class="w-8 h-8 rounded-full border-2 flex items-center justify-center shrink-0"
                                         :class="selectedOption === index ? 'border-blue-500 bg-blue-500' : 'border-slate-300'">
                                        <div class="w-3 h-3 rounded-full bg-white" x-show="selectedOption === index"></div>
                                    </div>
                                    <span class="text-slate-700 font-bold text-lg group-hover:text-blue-700" x-text="opt.text"></span>
                                </button>
                            </template>
                        </div>
                    </div>
                </div>

                <div class="p-6 bg-white border-t border-slate-100 flex justify-end">
                    <button @click="validateChoice()" 
                            :disabled="selectedOption === null"
                            class="bg-emerald-500 hover:bg-emerald-600 text-white font-black py-4 px-12 rounded-2xl transition-all shadow-lg active:scale-95 disabled:opacity-20 uppercase">
                        Confirmar Acción <i class="fa-solid fa-circle-check ml-2"></i>
                    </button>
                </div>
            </div>
        </div>
    </template>

    <!-- FEEDBACK POPUP -->
    <template x-if="showFeedback">
        <div class="fixed inset-0 bg-slate-950/80 backdrop-blur-xl flex items-center justify-center p-6 z-50">
            <div class="bg-white rounded-[3rem] p-10 max-w-md w-full shadow-2xl text-center border-t-8"
                 :class="isCorrect ? 'border-emerald-500' : 'border-red-500'">
                <div :class="isCorrect ? 'text-emerald-500' : 'text-red-500'" class="text-8xl mb-6">
                    <i :class="isCorrect ? 'fa-solid fa-circle-check' : 'fa-solid fa-triangle-exclamation'"></i>
                </div>
                <h3 class="text-3xl font-black mb-4 text-slate-800" x-text="isCorrect ? '¡CORRECTO!' : 'ERROR DE SEGURIDAD'"></h3>
                <p class="text-slate-500 text-lg mb-10 font-medium" x-text="feedbackMsg"></p>
                <button @click="nextMission()" class="w-full bg-slate-900 text-white font-black py-5 rounded-2xl hover:bg-black transition-all">
                    CONTINUAR <i class="fa-solid fa-arrow-right ml-2"></i>
                </button>
            </div>
        </div>
    </template>

    <!-- RESULTADOS FINALES -->
    <template x-if="screen === 'results'">
        <div class="bg-white p-12 rounded-[3rem] window-shadow text-center border border-slate-100 max-w-2xl mx-auto">
            <h1 class="text-4xl font-black text-slate-800 mb-4">Simulación Finalizada</h1>
            <div class="text-8xl font-black text-blue-600 mb-10" x-text="score"></div>

            <div class="grid grid-cols-2 gap-4 mb-10">
                <div class="bg-slate-50 p-6 rounded-3xl border border-slate-100">
                    <div class="text-slate-400 text-xs font-bold uppercase mb-1">Duración</div>
                    <div class="text-3xl font-black text-slate-700" x-text="totalTime + 's'"></div>
                </div>
                <div class="bg-slate-50 p-6 rounded-3xl border border-slate-100">
                    <div class="text-slate-400 text-xs font-bold uppercase mb-1">Registro de Datos</div>
                    <div class="text-sm font-black text-blue-600" x-text="uploadStatus"></div>
                </div>
            </div>

            <button onclick="window.location.reload()" class="bg-slate-100 hover:bg-slate-200 text-slate-500 font-black py-4 px-10 rounded-2xl transition-all">
                VOLVER A EMPEZAR
            </button>
        </div>
    </template>

</div>

<script>
function gameApp() {
    return {
        screen: 'welcome',
        userName: '',
        currentMission: 0,
        score: 0,
        startTime: null,
        totalTime: 0,
        selectedOption: null,
        showFeedback: false,
        isCorrect: false,
        feedbackMsg: '',
        uploadStatus: 'Sincronizando...',
        failedMissions: [],
        
        // URL ACTUALIZADA CON TU SCRIPT DE GOOGLE
        scriptURL: 'https://script.google.com/macros/s/AKfycbzoHUosWP50ejKD8i2PPSoARke7MLdleJbarMQjV3BFjeYj3XrxsVv9uWBwy6mv9fuPFA/exec',

        missions: [
            {
                title: "Identidad Digital",
                instruction: "¿Qué sistema usarías para firmar una beca oficial de forma segura?",
                context: "Estás en la Sede Electrónica y el sistema solicita validación de identidad.",
                options: [
                    { text: "Sistema Cl@ve o Certificado Digital", correct: true, feedback: "¡Correcto! Es el estándar de seguridad de la administración." },
                    { text: "Enviar foto del DNI por Instagram", correct: false, feedback: "Incorrecto. Las redes sociales no tienen validez legal administrativa." },
                    { text: "Poner mi nombre en mayúsculas al final", correct: false, feedback: "Error. Escribir tu nombre no equivale a una firma digital técnica." }
                ]
            },
            {
                title: "Seguridad E-Commerce",
                instruction: "¿En qué te fijas para saber si una tienda es técnicamente segura?",
                context: "URL: http://ofertas-gaming-increibles.es",
                options: [
                    { text: "Protocolo HTTPS y el icono del candado", correct: true, feedback: "¡Exacto! El cifrado es fundamental para proteger tus datos." },
                    { text: "Que el diseño sea muy moderno", correct: false, feedback: "No. El diseño no garantiza la seguridad técnica del servidor." },
                    { text: "Que tenga muchos seguidores en TikTok", correct: false, feedback: "Falso. Los seguidores se pueden comprar; los certificados SSL no." }
                ]
            },
            {
                title: "Patrones Oscuros",
                instruction: "Intentas cancelar un servicio y el botón es casi invisible. ¿Qué es?",
                context: "Un diseño que intenta confundir al usuario para que no se marche.",
                options: [
                    { text: "Un Patrón Oscuro (Dark Pattern)", correct: true, feedback: "¡Muy bien! Es una técnica de diseño manipulador." },
                    { text: "Un error de carga de la web", correct: false, feedback: "No. Suele ser una estrategia deliberada de la empresa." },
                    { text: "Una medida de seguridad extra", correct: false, feedback: "Error. La seguridad no debe impedir la libertad del usuario." }
                ]
            },
            {
                title: "Gestión de Salud",
                instruction: "¿Cuál es la vía más ágil para pedir cita médica?",
                context: "Quieres evitar esperas telefónicas.",
                options: [
                    { text: "App Oficial de Salud de mi Comunidad", correct: true, feedback: "¡Perfecto! Gestión directa y sin intermediarios." },
                    { text: "Llamar a Urgencias para preguntar", correct: false, feedback: "Error grave. Bloqueas un servicio crítico por una gestión de oficina." },
                    { text: "Escribir un comentario en el Facebook del hospital", correct: false, feedback: "Inútil. No es un canal oficial de gestión de datos privados." }
                ]
            },
            {
                title: "Inclusión Digital",
                instruction: "Un vecino mayor no sabe usar el cajero automático. ¿Qué es lo más justo?",
                context: "El banco solo ofrece atención a través de pantallas táctiles.",
                options: [
                    { text: "Exigir atención presencial y diseño accesible", correct: true, feedback: "¡Correcto! Debemos luchar contra la exclusión digital." },
                    { text: "Decirle que aprenda a usar el móvil", correct: false, feedback: "Poca empatía. La tecnología debe adaptarse a las personas, no al revés." },
                    { text: "Ignorar el problema porque no es nuestro", correct: false, feedback: "Error. Como ciudadanos digitales debemos fomentar la inclusión." }
                ]
            }
        ],

        startGame() {
            this.startTime = Date.now();
            this.screen = 'game';
        },

        validateChoice() {
            const current = this.missions[this.currentMission];
            const choice = current.options[this.selectedOption];
            this.isCorrect = choice.correct;
            this.feedbackMsg = choice.feedback;
            if(this.isCorrect) this.score += 20;
            else this.failedMissions.push(current.title);
            this.showFeedback = true;
        },

        nextMission() {
            this.showFeedback = false;
            this.selectedOption = null;
            if (this.currentMission < 4) this.currentMission++;
            else this.finishGame();
        },

        async finishGame() {
            this.totalTime = Math.floor((Date.now() - this.startTime) / 1000);
            this.screen = 'results';
            this.sendData();
        },

        async sendData() {
            const now = new Date();
            const payload = {
                nombre: this.userName,
                puntuacion: this.score,
                tiempo: this.totalTime,
                fallos: this.failedMissions.join(' | ') || 'Ninguno',
                fecha: now.toLocaleDateString('es-ES'),
                hora: now.toLocaleTimeString('es-ES')
            };

            try {
                // Enviamos los datos al script de Google
                await fetch(this.scriptURL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(payload)
                });
                this.uploadStatus = "¡Guardado con éxito!";
            } catch (e) {
                this.uploadStatus = "Error de conexión";
                console.error(e);
            }
        }
    }
}
</script>
</body>
</html>
